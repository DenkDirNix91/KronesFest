<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Krones Fest</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f7f7f7;
    text-align: center;
    margin-top: 100px;
    overflow: hidden;
  }

  button {
    font-size: 20px;
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin: 8px;
  }

  #btnYes { background: #2e7d32; color: white; }
  #btnNo { background: #c62828; color: white; }

  #phase2_yes,
  #phase2_no {
    display: none;
    margin-top: 40px;
  }

  .choiceBtn {
    background: #1565c0;
    color: white;
  }

  #runawayBtn {
    position: absolute;
    background: #c62828;
    color: white;
    display: none;
  }

  #sadHamster {
    display: none;
    width: 240px;
    margin: 20px auto;
    border-radius: 12px;
  }

  @keyframes shake {
    0% { transform: translate(0, 0) rotate(0deg); }
    25% { transform: translate(2px, -2px) rotate(-1deg); }
    50% { transform: translate(-2px, 2px) rotate(1deg); }
    75% { transform: translate(2px, 2px) rotate(0deg); }
    100% { transform: translate(0, 0) rotate(0deg); }
  }

  .shake {
    animation: shake 0.12s infinite;
  }
</style>
</head>

<body>

<h1>Hey Karo, möchtest du mit mir aufs Krones Fest gehen? 🎡</h1>

<button id="btnYes" onclick="yesClick()">Ja</button>
<button id="btnNo" onclick="noClick()">Nein</button>

<!-- PHASE 2 JA -->
<div id="phase2_yes">
  <h2>Wie wollen wir es machen? 🙂</h2>

  <button class="choiceBtn" onclick="pickup()">Ich hole dich ab 🚗</button>
  <button class="choiceBtn" onclick="meet()">Wir treffen uns dort 🎡</button>
</div>

<!-- PHASE 2 NEIN -->
<div id="phase2_no">
  <h2>Bist du dir sicher? 🤔</h2>

  <img
    id="sadHamster"
    src="https://media.giphy.com/media/98MaHVwJOmWMz4cz1K/giphy.gif"
    alt="Sad Hamster">

  <br>

  <button onclick="goBack()">Nein</button>
  <button id="runawayBtn">Ja</button>
</div>

<script>

let runawayBtn;
let runawayMode = false;
let escapeCount = 0;
let lastEscape = 0;

// ================= PHASE 1 =================

function yesClick() {
  document.getElementById("btnYes").style.display = "none";
  document.getElementById("btnNo").style.display = "none";

  launchConfetti();

  document.getElementById("phase2_yes").style.display = "block";
}

function noClick() {
  document.getElementById("btnYes").style.display = "none";
  document.getElementById("btnNo").style.display = "none";

  document.getElementById("phase2_no").style.display = "block";
  document.getElementById("sadHamster").style.display = "block";

  activateRunawayImmediately();
}

// ================= PHASE 2 NO =================

function goBack() {
  document.getElementById("phase2_no").style.display = "none";

  document.getElementById("btnYes").style.display = "inline-block";
  document.getElementById("btnNo").style.display = "inline-block";

  document.getElementById("sadHamster").style.display = "none";

  runawayMode = false;
  escapeCount = 0;

  if (runawayBtn) {
    runawayBtn.classList.remove("shake");
    runawayBtn.style.display = "none";
  }
}

// ================= RUNAWAY =================

function activateRunawayImmediately() {

  runawayBtn = document.getElementById("runawayBtn");

  runawayBtn.style.display = "inline-block";

  runawayBtn.style.left = "50%";
  runawayBtn.style.top = "60%";
  runawayBtn.style.transform = "translate(-50%, -50%)";

  runawayBtn.innerText = "Ja";

  runawayMode = true;
  escapeCount = 0;

  runawayBtn.onmouseenter = escape;

  runawayBtn.ontouchstart = function(e) {
    if (!runawayMode) return;

    e.preventDefault();
    escape();
  };
}

function escape() {

  const now = Date.now();

  if (now - lastEscape < 200) return;

  lastEscape = now;

  if (!runawayMode) return;

  escapeCount++;

  updateEmotion();

  const padding = 120;

  runawayBtn.style.left =
    Math.random() * (window.innerWidth - padding) + "px";

  runawayBtn.style.top =
    Math.random() * (window.innerHeight - padding) + "px";

  runawayBtn.style.transform = "none";
}

// ================= EMOTION =================

function updateEmotion() {

  if (escapeCount === 1) {
    runawayBtn.innerText = "Stop!";
  }

  else if (escapeCount === 2) {
    runawayBtn.innerText = "Warte kurz!";
  }

  else if (escapeCount === 3) {
    runawayBtn.innerText = "Wirklich?!";
  }

  else {
    runawayBtn.innerText = "Bist du dir ganz sicher?";
  }

  if (escapeCount >= 3) {
    runawayBtn.classList.add("shake");
  }
}

// ================= JA FLOW =================

function pickup() {
  finish("pickup");
}

function meet() {
  finish("meet");
}

function finish(type) {

const actionText =
type === "pickup"
? "Ich hole dich ab 🚗"
: "Wir treffen uns dort 🎡";

document.body.innerHTML = ` <div style="
   min-height:100vh;
   background:#efd0e0;
   font-family:Arial,sans-serif;
   text-align:center;
   padding-top:60px;
   box-sizing:border-box;
 ">

```
  <img
    src="https://media.giphy.com/media/l46CyJmS9KUbokzsI/giphy.gif"
    style="
      width:150px;
      border-radius:20px;
      margin-bottom:20px;
    ">

  <h2 style="
    color:#111;
    margin-bottom:30px;
  ">
    Gut dass du nicht Nein gesagt hast. 😉
  </h2>

  <div style="
    background:white;
    width:320px;
    max-width:90%;
    margin:auto;
    border-radius:20px;
    padding:25px;
    text-align:left;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
  ">

    <div style="
      font-size:13px;
      color:#777;
      margin-bottom:5px;
    ">
      📅 SEI BEREIT AM
    </div>

    <div style="
      font-size:22px;
      font-weight:bold;
    ">
      Freitag, 27. Juni · 19:00 Uhr
    </div>

    <div style="
      margin-top:10px;
      color:#555;
    ">
      📍 Krones Fest
    </div>

    <hr style="
      border:none;
      border-top:1px solid #eee;
      margin:18px 0;
    ">

    <div style="
      font-size:13px;
      color:#777;
      margin-bottom:5px;
    ">
      SO MACHEN WIR'S
    </div>

    <div style="
      font-size:22px;
      font-weight:bold;
    ">
      ${actionText}
    </div>

  </div>

  <button
    onclick="openWhatsApp('${type}')"
    style="
      margin-top:30px;
      background:#25D366;
      color:white;
      border:none;
      border-radius:40px;
      padding:18px 35px;
      font-size:22px;
      font-weight:bold;
      cursor:pointer;
      box-shadow:0 8px 20px rgba(37,211,102,.25);
    ">
    WhatsApp Bestätigung senden 💬
  </button>

  <div style="
    margin-top:25px;
    color:#444;
    line-height:1.5;
  ">
    <em>
      P.S. Normale Leute schicken eine WhatsApp.<br>
      Ich hab eine Website gebaut.
    </em>
  </div>

</div>
```

`;

launchConfetti();
}

</script>

</body>
</html>
